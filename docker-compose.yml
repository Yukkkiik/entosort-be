services:

  db:
    image: mysql:8.0
    container_name: entosort-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: entosort_db
      MYSQL_USER: entosort_user
      MYSQL_PASSWORD: entosort_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mqtt:
    image: eclipse-mosquitto:2
    container_name: entosort-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    command: mosquitto -c /mosquitto-no-auth.conf

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: entosort-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      db:
        condition: service_healthy

  backend:
    build: .
    container_name: entosort-be
    restart: unless-stopped
    ports:
      - "3000:3000"   # HTTP / Express
      - "3001:3001"   # WebSocket
    env_file:
      - .env.docker
    volumes:
      - ./src:/app/src           # Hot reload src
      - ./prisma:/app/prisma     # Sync prisma schema
    depends_on:
      db:
        condition: service_healthy
      mqtt:
        condition: service_started
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma db seed &&
             node src/app.js"

volumes:
  mysql_data: